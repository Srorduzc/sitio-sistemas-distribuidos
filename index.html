<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Distribuidos - Inicio</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            background: #8B0000;
            color: white;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }

        .stars::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow:
                50px 100px white,
                200px 300px white,
                400px 150px white,
                600px 250px white,
                800px 100px white;
            animation: animStars 5s linear infinite;
        }

        @keyframes animStars {
            from { transform: translateY(0); }
            to { transform: translateY(-500px); }
        }
    </style>
</head>

<body>
<div class="stars"></div>
