<style>
    body {
        background: #8B0000;
        color: white;
        overflow: hidden;
    }

    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        box-shadow:
            100px 200px white,
            300px 400px white,
            500px 150px white,
            700px 350px white;
        animation: animStars 6s linear infinite;
    }

    @keyframes animStars {
        from { transform: translateY(0); }
        to { transform: translateY(-500px); }
    }
</style>
