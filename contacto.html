<style>
    body {
        background: #8B0000;
        color: white;
        overflow: hidden;
    }

    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        box-shadow:
            80px 120px white,
            250px 350px white,
            450px 200px white,
            650px 300px white;
        animation: animStars 7s linear infinite;
    }

    @keyframes animStars {
        from { transform: translateY(0); }
        to { transform: translateY(-500px); }
    }
</style>
